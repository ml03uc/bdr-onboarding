<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MSP Onboarding | Alternative Payments</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ap: { navy: '#0a1628', blue: '#2563eb', light: '#60a5fa', slate: '#1e3a5f' }
          }
        }
      }
    }
  </script>
  <style>
    :root { --ap-navy:#0a1628; --ap-blue:#2563eb; --ap-light:#60a5fa; --ap-slate:#1e3a5f; }
    * { box-sizing: border-box; }
    body { background-color:#f0f4f8; color:#1a202c; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; margin:0; }
    .module-card { transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .module-card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.12); }
    .quiz-option { transition: all 0.15s ease; cursor: pointer; }
    .quiz-option:hover { border-color:#2563eb!important; background-color:#eff6ff!important; }
    .quiz-correct { border-color:#16a34a!important; background-color:#f0fdf4!important; }
    .quiz-wrong { border-color:#dc2626!important; background-color:#fef2f2!important; }
    .quiz-reveal { border-color:#16a34a!important; background-color:#dcfce7!important; }
    @keyframes slideIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .slide-in { animation: slideIn 0.3s ease forwards; }
    .progress-bar { transition: width 0.4s ease; }
    .nav-item-active { background: linear-gradient(135deg,#1e3a5f,#2563eb); color: white; }
    .gradient-header { background: linear-gradient(135deg,#0a1628 0%,#1e3a5f 50%,#2563eb 100%); }
    .ecosystem-node { transition: all 0.2s ease; }
    .ecosystem-node:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(37,99,235,0.3); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    // ─── Quiz Data ────────────────────────────────────────────────────────────
    const QUIZZES = {
      'what-is-msp': [
        {
          question: "An MSP (Managed Service Provider) is best described as...",
          options: [
            "A company that sells laptops and hardware to businesses",
            "A company that manages IT infrastructure and services for other businesses on an ongoing basis",
            "A software company that builds accounting tools",
            "A payment processor for technology companies"
          ],
          correct: 1,
          explanation: "MSPs deliver ongoing IT services like monitoring, cloud storage, help desk, and security for businesses that don't want to manage IT in-house."
        },
        {
          question: "How many MSPs are estimated to exist in the USA?",
          options: ["About 5,000", "About 40,000", "About 150,000", "About 1 million"],
          correct: 1,
          explanation: "MSP Resources reports approximately 40,000 MSPs in the USA, while 150,000 exist globally."
        },
        {
          question: "What is our Ideal Customer Profile (ICP)?",
          options: [
            "Enterprise MSPs with 500+ employees and $100M+ in revenue",
            "MSPs doing $1–$20M in annual revenue with 5–100 employees",
            "Solo freelance IT consultants",
            "SaaS companies that serve MSPs"
          ],
          correct: 1,
          explanation: "Our sweet spot is MSPs with $1–$20M in annual revenue. The CEO is usually directly aware of payment strategy, and they face the pain points we solve."
        }
      ],
      'tech-stack': [
        {
          question: "What does PSA stand for?",
          options: ["Payment Services Application","Professional Services Automation","Partner Software Arrangement","Platform Security Access"],
          correct: 1,
          explanation: "PSA = Professional Services Automation. It's the operational backbone of an MSP that handles tickets, billing, contracts, and time tracking."
        },
        {
          question: "Why does Alternative Payments only need to integrate into the PSA (not the RMM)?",
          options: [
            "Because RMMs are too complex to integrate with",
            "Because PSAs are what handle the billing side of an MSP's business",
            "Because RMMs are usually owned by different companies",
            "Because Alternative Payments is already built into all RMMs"
          ],
          correct: 1,
          explanation: "The PSA is where invoices are created, contracts are managed, and billing happens. The RMM is for monitoring and remote management. AP only needs to plug into billing."
        },
        {
          question: "Which of these tools does an MSP use to track expenses, run payroll, and file taxes?",
          options: ["The PSA","The RMM","Accounting Software (like QuickBooks)","The AP Platform"],
          correct: 2,
          explanation: "Accounting software like QuickBooks handles the financial side — payroll, expenses, taxes, and compliance. The PSA handles the operations side."
        }
      ],
      'psa-platforms': [
        {
          question: "Which PSA is considered a strategic win for AP because it's the only payment processor they officially integrate with?",
          options: ["ConnectWise","Autotask","SyncroMSP","HaloPSA"],
          correct: 3,
          explanation: "HaloPSA's only MSP payment processor integration is Alternative Payments. Since Halo is growing fast and taking market share, this is a huge opportunity."
        },
        {
          question: "ConnectBooster is owned by which company — and why does that matter to us?",
          options: [
            "ConnectWise — MSPs using ConnectWise love it",
            "Kaseya — MSPs dislike Kaseya, making them open to switching",
            "Alternative Payments — it's our own product",
            "QuickBooks — it's a financial product"
          ],
          correct: 1,
          explanation: "Kaseya owns ConnectBooster. Because MSPs widely dislike Kaseya (known for aggressive acquisitions and price hikes), ConnectBooster customers are often open to exploring alternatives."
        },
        {
          question: "Which tool would you use to connect ConnectWise to QuickBooks?",
          options: ["ConnectBooster","WisePay","WiseSync","FlexPoint"],
          correct: 2,
          explanation: "ConnectWise requires a separate tool called WiseSync to sync data with QuickBooks. AP doesn't need WiseSync because AP integrates directly with both."
        }
      ],
      'money-flow': [
        {
          question: "In a traditional MSP billing workflow WITHOUT AP, what is the most painful manual step?",
          options: [
            "Creating the invoice in the PSA",
            "Sending the invoice and chasing payment manually, then reconciling across systems",
            "Logging into QuickBooks",
            "Setting up service agreements"
          ],
          correct: 1,
          explanation: "Without AP, MSPs manually send invoices (often as PDFs via email), chase late payments, then manually reconcile payment data across their PSA and accounting software. AP automates all of this."
        },
        {
          question: "What does AP's dual integration mean for an MSP?",
          options: [
            "AP integrates with two different payment networks (Visa and Mastercard)",
            "AP connects to both the PSA and the accounting software simultaneously, updating both in real time when payment is made",
            "AP offers two pricing tiers",
            "AP works with both ConnectWise and Autotask"
          ],
          correct: 1,
          explanation: "Dual integration = AP connects to the PSA (like ConnectWise) AND the accounting software (like QuickBooks) at the same time. When a customer pays, both systems update automatically — no manual reconciliation needed."
        }
      ],
      'msp-culture': [
        {
          question: "MSPs rely heavily on which of the following when making purchasing decisions?",
          options: [
            "Vendor marketing materials and cold emails",
            "Peer groups, word of mouth, and social proof from other MSPs",
            "Government technology mandates",
            "What large enterprises are doing"
          ],
          correct: 1,
          explanation: "MSP communities are tight-knit. Tech Tribe, Lyra/Evergreen, and Reddit groups heavily influence purchasing. If one MSP loves AP, others in their peer group will follow."
        },
        {
          question: "Why do many MSPs dislike Kaseya?",
          options: [
            "Kaseya's products have poor uptime",
            "Kaseya charges too little, making them seem low-quality",
            "Kaseya has a reputation for acquiring beloved tools, then raising prices, extending contracts, and reducing support",
            "Kaseya only works with enterprise MSPs"
          ],
          correct: 2,
          explanation: "MSPs had tools they loved — Autotask, ConnectBooster — and then Kaseya bought them. This typically leads to price increases, long-term contracts, and reduced support. MSPs see AP as the underdog alternative they're rooting for."
        }
      ],
      'spot-psa': [
        {
          question: "The fastest way to identify which PSA an MSP uses is to...",
          options: [
            "Ask them directly on the first cold call",
            "Look at their LinkedIn page",
            "Click the 'Support' button on their website, which usually opens their PSA client portal",
            "Check their job postings for PSA software names"
          ],
          correct: 2,
          explanation: "When MSPs set up a support portal for their clients, it's powered by their PSA. Clicking 'Support' on their website usually loads a login page that reveals which PSA they use — the URL is the biggest giveaway."
        },
        {
          question: "If you see a login URL containing 'autotask.net', which PSA is the MSP using?",
          options: ["ConnectWise","HaloPSA","SyncroMSP","Autotask (owned by Kaseya)"],
          correct: 3,
          explanation: "Autotask portals load from autotask.net. Autotask was acquired by Kaseya in 2022 (previously owned by Datto, which acquired Autotask in 2017). So Autotask customers are Kaseya customers — and often open to switching payment processors."
        }
      ]
    };

    // ─── Ecosystem Diagram ────────────────────────────────────────────────────
    function EcosystemDiagram() {
      const [active, setActive] = useState(null);
      const nodes = [
        { id:'psa', label:'PSA', sublabel:'ConnectWise, Halo, Autotask', color:'#1e3a5f', x:180, y:140, desc:'The operational brain. Manages tickets, service agreements, invoices, and time tracking. This is where billing lives.' },
        { id:'rmm', label:'RMM', sublabel:'Remote Monitoring', color:'#374151', x:480, y:50, desc:"Remote Monitoring and Management. Keeps an eye on client computers and servers. Not billing-related — AP doesn't integrate here." },
        { id:'accounting', label:'Accounting', sublabel:'QuickBooks, Xero', color:'#065f46', x:480, y:230, desc:'Tracks money in and out. Handles payroll, taxes, and financial statements. Receives invoice data from the PSA.' },
        { id:'ap', label:'AP Platform', sublabel:'Alternative Payments', color:'#2563eb', x:840, y:140, desc:'The missing link. AP connects to BOTH the PSA and accounting software. When a customer pays through AP, both systems update in real time — no manual work needed.' },
        { id:'client', label:'MSP Client', sublabel:'End Customer', color:'#7c3aed', x:840, y:330, desc:'The business that pays the MSP. They receive an invoice with an AP payment link. They click, pay, and done.' },
      ];
      const lines = [
        { x1:280, y1:155, x2:400, y2:100, label:'Tickets → billing', color:'#374151' },
        { x1:280, y1:165, x2:400, y2:245, label:'Invoice sync', color:'#065f46' },
        { x1:580, y1:245, x2:760, y2:160, label:'Payment reconciled', color:'#2563eb' },
        { x1:580, y1:80, x2:780, y2:130, label:'', color:'#374151', dashed:true },
        { x1:940, y1:180, x2:940, y2:280, label:'Payment link', color:'#7c3aed' },
        { x1:760, y1:155, x2:580, y2:120, label:'', color:'#2563eb', dashed:true },
        { x1:760, y1:165, x2:580, y2:255, label:'', color:'#2563eb', dashed:true },
      ];
      const activeNode = nodes.find(n => n.id === active);
      return (
        <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden">
          <div className="px-6 py-4" style={{background:'linear-gradient(135deg,#0a1628,#1e3a5f,#2563eb)'}}>
            <h3 className="text-white font-bold text-lg">The MSP Tech Ecosystem</h3>
            <p className="text-blue-200 text-sm mt-1">Click any node to learn more about its role</p>
          </div>
          <div className="p-4">
            <div className="relative" style={{height:'420px'}}>
              <svg className="absolute inset-0 w-full h-full" style={{zIndex:0}} viewBox="0 0 1100 420" preserveAspectRatio="xMidYMid meet">
                {lines.map((l,i)=>(
                  <line key={i} x1={l.x1} y1={l.y1} x2={l.x2} y2={l.y2} stroke={l.color} strokeWidth={l.dashed?1.5:2.5} strokeDasharray={l.dashed?'6,4':undefined} opacity={0.6}/>
                ))}
                {lines.filter(l=>l.label).map((l,i)=>(
                  <text key={`lbl-${i}`} x={(l.x1+l.x2)/2} y={(l.y1+l.y2)/2-6} fontSize="11" fill={l.color} textAnchor="middle" opacity={0.8}>{l.label}</text>
                ))}
              </svg>
              {nodes.map(node=>(
                <button key={node.id} onClick={()=>setActive(active===node.id?null:node.id)} className="ecosystem-node absolute flex flex-col items-center justify-center rounded-2xl text-white font-bold text-sm shadow-lg border-2"
                  style={{backgroundColor:node.color, borderColor:active===node.id?'#60a5fa':'transparent', left:`${(node.x/1100)*100}%`, top:`${(node.y/420)*100}%`, transform:'translate(-50%,-50%)', width:'130px', height:'80px', zIndex:10, boxShadow:active===node.id?'0 0 0 3px #60a5fa, 0 8px 24px rgba(37,99,235,0.4)':undefined}}>
                  <span className="text-base font-black">{node.label}</span>
                  <span className="text-xs opacity-75 text-center px-2 leading-tight mt-1">{node.sublabel}</span>
                </button>
              ))}
            </div>
            {activeNode && (
              <div className="mt-2 p-4 rounded-xl border-2 border-blue-200 bg-blue-50 slide-in">
                <div className="flex items-start gap-3">
                  <div className="w-3 h-3 rounded-full mt-1 flex-shrink-0" style={{backgroundColor:activeNode.color}}/>
                  <div>
                    <p className="font-bold text-slate-800">{activeNode.label}</p>
                    <p className="text-slate-600 text-sm mt-1">{activeNode.desc}</p>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─── Invoice Flow ─────────────────────────────────────────────────────────
    function InvoiceFlow({ mode }) {
      const traditional = [
        { icon:'📄', label:'Create invoice', sub:'in PSA', color:'#1e3a5f' },
        { icon:'📧', label:'Manually email', sub:'PDF invoice', color:'#374151' },
        { icon:'⏳', label:'Wait and chase', sub:'late payments', color:'#dc2626' },
        { icon:'🖩', label:'Manually sync', sub:'to accounting', color:'#d97706' },
        { icon:'🔍', label:'Reconcile', sub:'errors manually', color:'#7c3aed' },
      ];
      const withAP = [
        { icon:'📄', label:'Create invoice', sub:'in PSA', color:'#1e3a5f' },
        { icon:'🔗', label:'AP link in email', sub:'sent automatically', color:'#2563eb' },
        { icon:'💳', label:'Client pays online', sub:'card, ACH, any method', color:'#059669' },
        { icon:'⚡', label:'PSA updates', sub:'automatically', color:'#059669' },
        { icon:'✅', label:'QuickBooks synced', sub:'zero manual work', color:'#059669' },
      ];
      const steps = mode==='traditional'?traditional:withAP;
      return (
        <div className={`rounded-2xl border-2 p-5 ${mode==='traditional'?'border-red-200 bg-red-50':'border-green-200 bg-green-50'}`}>
          <p className={`font-bold text-sm mb-4 ${mode==='traditional'?'text-red-700':'text-green-700'}`}>
            {mode==='traditional'?'❌ Traditional (manual & painful)':'✅ With Alternative Payments (automated)'}
          </p>
          <div className="flex flex-wrap items-center gap-2">
            {steps.map((step,i)=>(
              <div key={i} className="flex items-center gap-2">
                <div className="flex flex-col items-center text-center">
                  <div className="w-14 h-14 rounded-full flex items-center justify-center text-2xl shadow-sm bg-white border-2" style={{borderColor:step.color}}>{step.icon}</div>
                  <p className="text-xs font-semibold mt-1 text-slate-700 w-16 leading-tight">{step.label}</p>
                  <p className="text-xs text-slate-500 w-16 leading-tight">{step.sub}</p>
                </div>
                {i<steps.length-1&&<span className={`text-xl font-bold flex-shrink-0 ${mode==='traditional'?'text-red-400':'text-green-500'}`}>→</span>}
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─── PSA Card ─────────────────────────────────────────────────────────────
    function PSACard({ name, owner, processor, notes, color, isExpanded, onClick }) {
      return (
        <button onClick={onClick} className="w-full text-left rounded-2xl border-2 overflow-hidden transition-all duration-200" style={{borderColor:isExpanded?color:'#e2e8f0'}}>
          <div className="flex items-center gap-4 p-4" style={{backgroundColor:isExpanded?color:'#f8fafc'}}>
            <div className="w-10 h-10 rounded-xl flex items-center justify-center text-white font-black text-lg flex-shrink-0" style={{backgroundColor:color}}>{name[0]}</div>
            <div className="flex-1">
              <p className={`font-bold ${isExpanded?'text-white':'text-slate-800'}`}>{name}</p>
              <p className={`text-xs ${isExpanded?'text-white opacity-80':'text-slate-500'}`}>Owned by {owner}</p>
            </div>
            <span className={`text-lg ${isExpanded?'text-white':'text-slate-400'}`}>{isExpanded?'▲':'▼'}</span>
          </div>
          {isExpanded&&(
            <div className="p-4 bg-white slide-in">
              <div className="grid grid-cols-2 gap-3 mb-3">
                <div className="bg-slate-50 rounded-xl p-3">
                  <p className="text-xs text-slate-500 font-semibold uppercase tracking-wide">Default Payment Tool</p>
                  <p className="text-sm font-bold text-slate-800 mt-1">{processor}</p>
                </div>
                <div className="bg-blue-50 rounded-xl p-3">
                  <p className="text-xs text-blue-500 font-semibold uppercase tracking-wide">AP Opportunity</p>
                  <p className="text-sm font-bold text-blue-800 mt-1">Open to switching</p>
                </div>
              </div>
              <p className="text-sm text-slate-600 leading-relaxed">{notes}</p>
            </div>
          )}
        </button>
      );
    }

    // ─── Quiz Component ───────────────────────────────────────────────────────
    function QuizSection({ questions, moduleId }) {
      const [current, setCurrent] = useState(0);
      const [selected, setSelected] = useState(null);
      const [answered, setAnswered] = useState(false);
      const [score, setScore] = useState(0);
      const [done, setDone] = useState(false);
      const q = questions[current];

      function pick(idx) {
        if (answered) return;
        setSelected(idx);
        setAnswered(true);
        if (idx===q.correct) setScore(s=>s+1);
      }
      function next() {
        if (current+1>=questions.length) { setDone(true); }
        else { setCurrent(c=>c+1); setSelected(null); setAnswered(false); }
      }
      function restart() { setCurrent(0); setSelected(null); setAnswered(false); setScore(0); setDone(false); }

      if (done) {
        const pct = Math.round((score/questions.length)*100);
        return (
          <div className="bg-white rounded-2xl border border-slate-200 p-6 text-center slide-in">
            <div className="text-5xl mb-3">{pct===100?'🏆':pct>=67?'🎯':'📚'}</div>
            <p className="text-2xl font-black text-slate-800">{score} / {questions.length} correct</p>
            <p className="text-slate-500 mt-1">{pct===100?'Perfect score! You nailed it.':pct>=67?'Nice work! Review any missed questions.':'Keep reviewing this module and try again.'}</p>
            <button onClick={restart} className="mt-4 px-6 py-2 rounded-xl text-white font-bold text-sm" style={{backgroundColor:'#2563eb'}}>Try Again</button>
          </div>
        );
      }
      return (
        <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden">
          <div className="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
            <div className="flex items-center gap-2"><span className="text-xl">🧠</span><span className="font-bold text-slate-800">Quick Check</span></div>
            <span className="text-sm text-slate-400">Question {current+1} of {questions.length}</span>
          </div>
          <div className="p-6 slide-in" key={current}>
            <p className="font-semibold text-slate-800 text-base leading-snug mb-5">{q.question}</p>
            <div className="flex flex-col gap-2">
              {q.options.map((opt,idx)=>{
                let cls='quiz-option border-2 border-slate-200 rounded-xl p-3 text-left text-sm text-slate-700';
                if (answered) {
                  if (idx===q.correct) cls+=' quiz-reveal';
                  else if (idx===selected&&idx!==q.correct) cls+=' quiz-wrong';
                }
                return (
                  <button key={idx} className={cls} onClick={()=>pick(idx)}>
                    <span className="font-bold mr-2 text-slate-400">{['A','B','C','D'][idx]}.</span>
                    {opt}
                    {answered&&idx===q.correct&&<span className="ml-2">✓</span>}
                    {answered&&idx===selected&&idx!==q.correct&&<span className="ml-2">✗</span>}
                  </button>
                );
              })}
            </div>
            {answered&&(
              <div className="mt-4 p-4 bg-blue-50 rounded-xl border border-blue-200 slide-in">
                <p className="text-sm font-semibold text-blue-800 mb-1">{selected===q.correct?'✅ Correct!':'❌ Not quite.'}</p>
                <p className="text-sm text-blue-700">{q.explanation}</p>
                <button onClick={next} className="mt-3 px-5 py-2 rounded-xl text-white font-bold text-sm" style={{backgroundColor:'#2563eb'}}>
                  {current+1<questions.length?'Next Question →':'See Results'}
                </button>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─── Dual Integration Diagram ─────────────────────────────────────────────
    function DualIntegrationDiagram() {
      const [step, setStep] = useState(0);
      const steps = [
        { label:'Invoice created in PSA', icon:'📄', active:['psa'] },
        { label:'AP sends branded invoice email with payment link', icon:'📧', active:['psa','ap'] },
        { label:'Client pays via AP portal', icon:'💳', active:['ap','client'] },
        { label:'PSA marked paid automatically', icon:'✅', active:['psa','ap'] },
        { label:'Accounting software updated in real time', icon:'📊', active:['ap','qb'] },
      ];
      const cur = steps[step];
      return (
        <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden">
          <div className="px-6 py-4" style={{background:'linear-gradient(135deg,#0a1628,#1e3a5f,#2563eb)'}}>
            <h3 className="text-white font-bold text-lg">How AP Fits: Dual Integration</h3>
            <p className="text-blue-200 text-sm">Step through the payment flow</p>
          </div>
          <div className="p-6">
            <div className="relative h-64 mb-6">
              <svg className="absolute inset-0 w-full h-full" viewBox="0 0 600 260" preserveAspectRatio="xMidYMid meet">
                <line x1="155" y1="90" x2="245" y2="90" stroke={cur.active.includes('psa')&&cur.active.includes('ap')?'#2563eb':'#cbd5e1'} strokeWidth="2.5" strokeDasharray={cur.active.includes('psa')&&cur.active.includes('ap')?'8,3':undefined}/>
                <line x1="355" y1="90" x2="445" y2="90" stroke={cur.active.includes('ap')&&cur.active.includes('qb')?'#059669':'#cbd5e1'} strokeWidth="2.5" strokeDasharray={cur.active.includes('ap')&&cur.active.includes('qb')?'8,3':undefined}/>
                <line x1="300" y1="140" x2="300" y2="180" stroke={cur.active.includes('ap')&&cur.active.includes('client')?'#7c3aed':'#cbd5e1'} strokeWidth="2.5" strokeDasharray={cur.active.includes('ap')&&cur.active.includes('client')?'8,3':undefined}/>
              </svg>
              <div className={`absolute top-8 left-0 w-36 rounded-2xl p-3 text-center transition-all duration-300 ${cur.active.includes('psa')?'ring-2 ring-blue-400 shadow-lg':'opacity-50'}`} style={{backgroundColor:'#1e3a5f'}}>
                <p className="text-white font-black text-sm">PSA</p>
                <p className="text-blue-200 text-xs mt-0.5">Invoices live here</p>

          </div>
          <div className="bg-white rounded-2xl border border-slate-200 p-6">
            <h3 className="font-black text-slate-800 text-lg mb-4">MSP Communities We Already Work With</h3>
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
              {[{name:'Tech Tribe',type:'Peer Group'},{name:'Lyra',type:'Peer Group'},{name:'Evergreen',type:'Community'},{name:'Reddit MSP',type:'Online Forum'}].map(c=>(
                <div key={c.name} className="bg-slate-50 rounded-xl p-4 text-center border border-slate-200">
                  <p className="font-bold text-slate-800 text-sm">{c.name}</p>
                  <p className="text-slate-500 text-xs mt-1">{c.type}</p>
                </div>
              ))}
            </div>
          </div>
          <QuizSection questions={QUIZZES['msp-culture']} moduleId="msp-culture"/>
        </div>
      );

      if (moduleId==='spot-psa') return (
        <div className="space-y-6 slide-in">
          <div className="bg-white rounded-2xl border border-slate-200 p-6">
            <h2 className="text-2xl font-black mb-2" style={{color:'#0a1628'}}>How to Spot a PSA on Their Website</h2>
            <p className="text-slate-600 leading-relaxed">Before a cold call, you can often figure out which PSA an MSP uses — and therefore which payment processor they are likely running — just by visiting their website.</p>
          </div>
          <div className="rounded-2xl border border-blue-200 p-6" style={{background:'linear-gradient(135deg,#eff6ff,#eef2ff)'}}>
            <h3 className="font-black text-blue-900 text-lg mb-3">The Trick</h3>
            <p className="text-blue-800 leading-relaxed">MSPs set up a support portal so their clients can submit tickets. This portal is powered by their PSA. Find it by clicking the <strong>"Support"</strong> or <strong>"Client Portal"</strong> button on their website. The URL or login page usually reveals which PSA they use.</p>
          </div>
          <div className="space-y-4">
            {[
              {psa:'ConnectWise',signals:['URL contains connectwise.com or screensurfer.com','Login page has a dark navy theme','Often shows a "ConnectWise" logo in the portal'],processor:'WisePay',opportunity:'WisePay is limited to ConnectWise only. AP offers ConnectWise integration with accounting sync WisePay cannot provide.',color:'#1e3a5f'},
              {psa:'Autotask (Kaseya)',signals:['URL contains autotask.net','Login screen typically reads "Autotask PSA" or "Client Portal"','Simple, corporate-looking login form'],processor:'ConnectBooster',opportunity:"Kaseya-owned. They're your best prospect for switching. Lead with the Kaseya angle.",color:'#b45309'},
              {psa:'HaloPSA',signals:['URL contains haloservicedesk.com or a custom subdomain','Clean, modern portal design','Halo branding visible'],processor:'Alternative Payments (we are the exclusive partner)',opportunity:'Every HaloPSA prospect is a warm AP lead. They likely already know us.',color:'#059669'},
              {psa:'SyncroMSP',signals:['URL contains syncromsp.com','Minimal, modern portal','Often branded with the MSP name but Syncro powered'],processor:'WorldPay or Stripe',opportunity:'Smaller market but still worth noting. Generic payment tools mean no PSA reconciliation.',color:'#0284c7'},
            ].map(p=>(
              <div key={p.psa} className="bg-white rounded-2xl border border-slate-200 overflow-hidden">
                <div className="flex items-center gap-4 p-4 border-b border-slate-100" style={{backgroundColor:p.color+'15'}}>
                  <div className="w-10 h-10 rounded-xl flex items-center justify-center text-white font-black" style={{backgroundColor:p.color}}>{p.psa[0]}</div>
                  <div>
                    <p className="font-black text-slate-800">{p.psa}</p>
                    <p className="text-xs text-slate-500">Default payment tool: <strong>{p.processor}</strong></p>
                  </div>
                </div>
                <div className="p-4 grid md:grid-cols-2 gap-4">
                  <div>
                    <p className="text-xs font-bold text-slate-500 uppercase tracking-wide mb-2">How to recognize it</p>
                    <ul className="space-y-1">
                      {p.signals.map(s=>(
                        <li key={s} className="flex gap-2 text-xs text-slate-600"><span className="text-slate-400 flex-shrink-0">•</span>{s}</li>
                      ))}
                    </ul>
                  </div>
                  <div className="bg-blue-50 rounded-xl p-3">
                    <p className="text-xs font-bold text-blue-700 uppercase tracking-wide mb-1">AP Opportunity</p>
                    <p className="text-xs text-blue-600 leading-relaxed">{p.opportunity}</p>
                  </div>
                </div>
              </div>
            ))}
          </div>
          <QuizSection questions={QUIZZES['spot-psa']} moduleId="spot-psa"/>
        </div>
      );

      return null;
    }

    // ─── Module Definitions ───────────────────────────────────────────────────
    const MODULES = [
      {id:'what-is-msp',icon:'🏢',title:'What Is an MSP?',desc:'The basics of Managed Service Providers',time:'8 min',color:'#1e3a5f'},
      {id:'tech-stack',icon:'🔧',title:'The MSP Tech Stack',desc:'PSA, RMM, and accounting software explained',time:'10 min',color:'#374151'},
      {id:'psa-platforms',icon:'🎛️',title:'PSA Platforms',desc:'ConnectWise, Autotask, HaloPSA, and more',time:'10 min',color:'#b45309'},
      {id:'money-flow',icon:'💰',title:'How MSPs Get Paid',desc:'The invoice flow from billing to collection',time:'8 min',color:'#065f46'},
      {id:'ap-fit',icon:'⚡',title:'Where AP Fits',desc:'Dual integration and the AP advantage',time:'10 min',color:'#2563eb'},
      {id:'msp-culture',icon:'🤝',title:'MSP Culture',desc:'How to sell to MSPs effectively',time:'7 min',color:'#7c3aed'},
      {id:'spot-psa',icon:'🔍',title:'Spot a PSA',desc:'Identify PSA types from MSP websites',time:'6 min',color:'#0284c7'},
    ];

    // ─── Home Screen ──────────────────────────────────────────────────────────
    function HomeScreen({ onSelect }) {
      return (
        <div className="space-y-6 slide-in">
          <div className="gradient-header rounded-2xl p-8 text-white">
            <div className="flex items-center gap-3 mb-4">
              <div className="w-10 h-10 rounded-xl flex items-center justify-center text-xl" style={{backgroundColor:'rgba(255,255,255,0.2)'}}>⚡</div>
              <span className="text-blue-200 font-semibold">Alternative Payments</span>
            </div>
            <h1 className="text-3xl font-black leading-tight mb-3">MSP Landscape<br/>BDR Onboarding</h1>
            <p className="text-blue-100 leading-relaxed max-w-lg">Everything you need to understand the MSP market, speak the language, and sell with confidence. Work through each module at your own pace.</p>
            <div className="mt-5 flex flex-wrap gap-3">
              <div className="rounded-xl px-4 py-2 text-sm font-semibold" style={{backgroundColor:'rgba(255,255,255,0.15)'}}>7 Modules</div>
              <div className="rounded-xl px-4 py-2 text-sm font-semibold" style={{backgroundColor:'rgba(255,255,255,0.15)'}}>Interactive visuals</div>
              <div className="rounded-xl px-4 py-2 text-sm font-semibold" style={{backgroundColor:'rgba(255,255,255,0.15)'}}>Quizzes included</div>
            </div>
          </div>
          <div className="grid md:grid-cols-2 gap-4">
            {MODULES.map(m=>(
              <button key={m.id} onClick={()=>onSelect(m.id)} className="module-card bg-white rounded-2xl border border-slate-200 p-5 text-left shadow-sm">
                <div className="flex items-start gap-4">
                  <div className="w-12 h-12 rounded-2xl flex items-center justify-center text-2xl flex-shrink-0" style={{backgroundColor:m.color+'20'}}>{m.icon}</div>
                  <div className="flex-1">
                    <p className="font-black text-slate-800 text-base">{m.title}</p>
                    <p className="text-slate-500 text-sm mt-1 leading-snug">{m.desc}</p>
                    <p className="text-xs font-semibold mt-2" style={{color:m.color}}>{m.time} read</p>
                  </div>
                  <span className="text-slate-300 text-xl mt-1">→</span>
                </div>
              </button>
            ))}
          </div>
        </div>
      );
    }

    // ─── Main App ─────────────────────────────────────────────────────────────
    function App() {
      const [active, setActive] = useState('home');
      const [sidebarOpen, setSidebarOpen] = useState(false);
      const current = MODULES.find(m=>m.id===active);

      return (
        <div className="min-h-screen flex flex-col" style={{backgroundColor:'#f0f4f8'}}>
          <nav className="sticky top-0 z-50 bg-white border-b border-slate-200 shadow-sm">
            <div className="max-w-7xl mx-auto px-4 h-14 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <button onClick={()=>setSidebarOpen(!sidebarOpen)} className="md:hidden p-2 rounded-lg text-slate-500 hover:bg-slate-100">☰</button>
                <button onClick={()=>setActive('home')} className="flex items-center gap-2">
                  <div className="w-7 h-7 rounded-lg flex items-center justify-center" style={{backgroundColor:'#0a1628'}}>
                    <span className="text-white text-xs font-black">AP</span>
                  </div>
                  <span className="font-black text-slate-800 text-sm hidden sm:block">MSP Onboarding</span>
                </button>
                {active!=='home'&&current&&(
                  <>
                    <span className="text-slate-300 hidden sm:block">/</span>
                    <span className="text-slate-600 text-sm font-semibold hidden sm:block">{current.title}</span>
                  </>
                )}
              </div>
              <button onClick={()=>setActive('home')} className={`text-sm font-semibold px-4 py-1.5 rounded-xl transition-all ${active==='home'?'text-blue-600':'text-slate-500 hover:text-slate-800'}`}>All Modules</button>
            </div>
          </nav>

          <div className="flex flex-1 max-w-7xl mx-auto w-full">
            <aside className={`${sidebarOpen?'block':'hidden'} md:block w-64 flex-shrink-0 border-r border-slate-200 bg-white`}
              style={{position:'sticky',top:'56px',height:'calc(100vh - 56px)',overflowY:'auto'}}>
              <div className="p-4">
                <button onClick={()=>{setActive('home');setSidebarOpen(false)}} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-semibold transition-all mb-1 ${active==='home'?'nav-item-active':'text-slate-600 hover:bg-slate-100'}`}>
                  <span>🏠</span> Home
                </button>
                <div className="mt-2 mb-1 px-3">
                  <p className="text-xs font-bold text-slate-400 uppercase tracking-widest">Modules</p>
                </div>
                {MODULES.map(m=>(
                  <button key={m.id} onClick={()=>{setActive(m.id);setSidebarOpen(false)}} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-semibold transition-all mb-0.5 ${active===m.id?'nav-item-active':'text-slate-600 hover:bg-slate-100'}`}>
                    <span>{m.icon}</span>
                    <span className="truncate">{m.title}</span>
                  </button>
                ))}
              </div>
            </aside>

            <main className="flex-1 p-4 md:p-6 overflow-x-hidden">
              {active==='home'
                ? <HomeScreen onSelect={(id)=>setActive(id)}/>
                : <ModuleContent moduleId={active}/>
              }
            </main>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
